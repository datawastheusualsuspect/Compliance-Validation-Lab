services:
  samba-ad:
    image: dperson/samba
    container_name: samba-ad
    environment:
      - USER=Administrator
      - DOMAIN=BLUESTRIPE.LOCAL
      - WORKGROUP=BLUEST
    networks:
      - management
    volumes:
      - ./samba/data:/var/lib/samba

  dns:
    image: andyshinn/dnsmasq:2.78
    container_name: dns
    command: --no-resolv --server=8.8.8.8 --address=/bluestripe.local/192.168.50.10
    networks:
      - internal
    volumes:
      - ./dns/dnsmasq.conf:/etc/dnsmasq.conf

  web1:
    build:
      context: ./web1
      dockerfile: Dockerfile
    container_name: web1
    networks:
      - dmz
    volumes:
      - ./web1/www:/usr/local/apache2/htdocs/
      - ./web1/logs:/usr/local/apache2/logs

  web2:
    build:
      context: ./web2
      dockerfile: Dockerfile
    container_name: web2
    networks:
      - dmz
    volumes:
      - ./web2/www:/usr/local/apache2/htdocs/
      - ./web2/logs:/usr/local/apache2/logs

  secure-gw:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: secure-gw
    networks:
      - perimeter
      - internal
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/logs:/var/log/nginx
    ports:
      - "8443:443"

  mail:
    image: mailhog/mailhog
    container_name: mail
    networks:
      - internal
    ports:
      - "1025:1025"
      - "8025:8025"

  elk:
    image: sebp/elk:761
    container_name: elk
    environment:
      - ES_HEAP_SIZE=512m
    networks:
      - management
    ports:
      - "5601:5601"
      - "9200:9200"

  filebeat:
    image: docker.elastic.co/beats/filebeat:7.9.2
    container_name: filebeat
    volumes:
      - ./filebeat/filebeat.yml:/usr/share/filebeat/filebeat.yml:ro
      - ./nginx/logs:/var/log/nginx:ro
      - ./web1/logs:/usr/local/apache2/logs:ro
      - ./web2/logs:/usr/local/apache2/logs:ro
    depends_on:
      - elk
    networks:
      - management

  metricbeat:
    image: docker.elastic.co/beats/metricbeat:7.9.2
    container_name: metricbeat
    user: root
    volumes:
      - ./metricbeat/metricbeat.yml:/usr/share/metricbeat/metricbeat.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /sys/fs/cgroup:/hostfs/sys/fs/cgroup:ro
      - /proc:/hostfs/proc:ro
    environment:
      - ELASTICSEARCH_HOST=elk
    depends_on:
      - elk
    networks:
      - management

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    networks:
      - management

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"
    networks:
      - management

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    ports:
      - "8080:8080"
    networks:
      - management

  client:
    image: ubuntu:22.04
    container_name: client
    networks:
      - internal
    tty: true

networks:
  management:
    driver: bridge
  internal:
    driver: bridge
  dmz:
    driver: bridge
  perimeter:
    driver: bridge
